// ===== 均线计算 =====
function calcMA(data, dayCount) {
  var result = [];
  for (var i = 0; i < data.length; i++) {
    if (i < dayCount - 1) {
      result.push(null);
    } else {
      var sum = 0;
      for (var j = 0; j < dayCount; j++) {
        sum += data[i - j].close;
      }
      result.push(+(sum / dayCount).toFixed(2));
    }
  }
  return result;
}

// ===== 格式化工具 =====
function formatAmount(val) {
  if (val >= 1e8) return (val / 1e8).toFixed(2) + '亿';
  if (val >= 1e4) return (val / 1e4).toFixed(2) + '万';
  return val.toFixed(0);
}

function formatVol(val) {
  if (val >= 1e4) return (val / 1e4).toFixed(2) + '万手';
  return val.toFixed(0) + '手';
}

    '<div class="info-item">' +
      '<div class="info-label">最新收盘价</div>' +
      '<div class="info-value ' + (last.change >= 0 ? 'up' : 'down') + '">¥' + last.close.toFixed(2) + '</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,0.5)">' + dates[dates.length-1] + '</div>' +
    '</div>' +
    '<div class="info-item">' +
      '<div class="info-label">涨跌幅</div>' +
      '<div class="info-value ' + (last.change >= 0 ? 'up' : 'down') + '">' + (last.pct_chg >= 0 ? '+' : '') + last.pct_chg.toFixed(2) + '%</div>' +
    '</div>' +
    '<div class="info-item">' +
      '<div class="info-label">区间涨跌</div>' +
      '<div class="info-value ' + (isUp ? 'up' : 'down') + '">' + (isUp ? '+' : '') + rangePct + '%</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,0.5)">近一年</div>' +
    '</div>';

  // 概览卡片 — 添加id以便动态更新
  document.getElementById('summary-cards').innerHTML =
    '<div class="card"><div class="label">开盘价</div><div class="value" id="card-open">¥' + last.open.toFixed(2) + '</div></div>' +
    '<div class="card"><div class="label">最高价</div><div class="value" id="card-high" style="color:#ff4d4f">¥' + last.high.toFixed(2) + '</div></div>' +
    '<div class="card"><div class="label">最低价</div><div class="value" id="card-low" style="color:#52c41a">¥' + last.low.toFixed(2) + '</div></div>' +
    '<div class="card"><div class="label">成交量</div><div class="value" id="card-vol">' + formatVol(last.vol) + '</div></div>' +
    '<div class="card"><div class="label">成交额</div><div class="value" id="card-amt">' + formatAmount(last.amount) + '</div></div>' +
    '<div class="card"><div class="label">区间最高 / 最低</div>' +
      '<div class="value" style="font-size:16px">' +
        '<span id="card-range-high" style="color:#ff4d4f">¥' + maxPrice.toFixed(2) + '</span> / ' +
        '<span id="card-range-low" style="color:#52c41a">¥' + minPrice.toFixed(2) + '</span>' +
      '</div></div>';

  // 动态更新卡片数据的函数
  function updateCards(idx) {
    if (idx == null || idx < 0 || idx >= rawData.length) idx = rawData.length - 1;
    var d = rawData[idx];
    var dateStr = dates[idx];
    document.getElementById('card-open').textContent = '¥' + d.open.toFixed(2);
    document.getElementById('card-open').parentNode.querySelector('.label').textContent = '开盘价 (' + dateStr + ')';
    document.getElementById('card-high').textContent = '¥' + d.high.toFixed(2);
    document.getElementById('card-high').parentNode.querySelector('.label').textContent = '最高价 (' + dateStr + ')';
    document.getElementById('card-low').textContent = '¥' + d.low.toFixed(2);
    document.getElementById('card-low').parentNode.querySelector('.label').textContent = '最低价 (' + dateStr + ')';
    document.getElementById('card-vol').textContent = formatVol(d.vol);
    document.getElementById('card-vol').parentNode.querySelector('.label').textContent = '成交量 (' + dateStr + ')';
    document.getElementById('card-amt').textContent = formatAmount(d.amount);
    document.getElementById('card-amt').parentNode.querySelector('.label').textContent = '成交额 (' + dateStr + ')';
    document.getElementById('card-range-high').textContent = '¥' + maxPrice.toFixed(2);
    document.getElementById('card-range-low').textContent = '¥' + minPrice.toFixed(2);
  }

  // 恢复默认（最后一天）
  function resetCards() {
    updateCards(rawData.length - 1);
  }

  // ===== K线图 =====
  var klineChart = echarts.init(document.getElementById('kline-chart'));
  klineChart.setOption({
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      formatter: function(params) {
        var p = params.filter(function(p) { return p.seriesName === 'K线'; })[0];
        if (!p) return '';
        var d = p.data, idx = p.dataIndex;
        var change = ((d[2] - d[1]) / d[1] * 100).toFixed(2);
        var cc = change >= 0 ? upColor : downColor;
        return '<div style="font-size:14px;font-weight:700;margin-bottom:8px">' + dates[idx] + '</div>' +
          '<table style="font-size:12px;border-spacing:4px">' +
          '<tr><td>开盘：</td><td style="font-weight:600">¥' + d[1] + '</td></tr>' +
          '<tr><td>收盘：</td><td style="font-weight:600;color:' + cc + '">¥' + d[2] + '</td></tr>' +
          '<tr><td>最低：</td><td style="color:' + downColor + '">¥' + d[3] + '</td></tr>' +
          '<tr><td>最高：</td><td style="color:' + upColor + '">¥' + d[4] + '</td></tr>' +
          '<tr><td>涨跌：</td><td style="font-weight:600;color:' + cc + '">' + change + '%</td></tr>' +
          '<tr><td>成交量：</td><td>' + formatVol(rawData[idx].vol) + '</td></tr>' +
          '</table>';
      }
    },
    grid: [{ left: '8%', right: '3%', top: '5%', height: '82%' }],
    xAxis: {
      type: 'category', data: dates, boundaryGap: true,
      axisLine: { lineStyle: { color: '#e0e0e0' } },
      axisLabel: { color: '#999', formatter: function(v) { return v.slice(5); }, interval: Math.floor(dates.length / 12) },
      axisTick: { show: false }
    },
    yAxis: {
      scale: true,
      splitArea: { show: true, areaStyle: { color: ['rgba(250,250,250,0.3)', 'rgba(245,245,245,0.3)'] } },
      axisLabel: { formatter: '¥{value}', color: '#666' },
      splitLine: { lineStyle: { color: '#f0f0f0' } }
    },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, start: 60, end: 100 },
      { type: 'slider', xAxisIndex: 0, start: 60, end: 100, height: 28, bottom: 8,
        borderColor: 'transparent', backgroundColor: '#f5f5f5',
        fillerColor: 'rgba(15,52,96,0.2)', handleStyle: { color: '#0f3460' },
        textStyle: { color: '#999', fontSize: 11 } }
    ],
    series: [
      {
        name: 'K线', type: 'candlestick', data: klineData,
        itemStyle: { color: upColor, color0: downColor, borderColor: upColor, borderColor0: downColor },
        markLine: {
          silent: true, symbol: 'none',
          label: { fontSize: 11, color: '#999' },
          lineStyle: { type: 'dashed', color: '#bbb', width: 1 },
          data: [{ yAxis: first.close, name: '起始 ¥' + first.close.toFixed(0) }, { yAxis: last.close, name: '最新 ¥' + last.close.toFixed(0) }]
        }
      },
      { name: 'MA5', type: 'line', data: ma5, smooth: true, lineStyle: { width: 1.2, color: '#e6a23c' }, symbol: 'none' },
      { name: 'MA10', type: 'line', data: ma10, smooth: true, lineStyle: { width: 1.2, color: '#409eff' }, symbol: 'none' },
      { name: 'MA20', type: 'line', data: ma20, smooth: true, lineStyle: { width: 1.2, color: '#9b59b6' }, symbol: 'none' },
      { name: 'MA30', type: 'line', data: ma30, smooth: true, lineStyle: { width: 1.2, color: '#2ecc71' }, symbol: 'none' }
    ]
  });

  // ===== 成交量图 =====
  var volColors = rawData.map(function(d) { return d.close >= d.open ? upColor : downColor; });
  var volChart = echarts.init(document.getElementById('volume-chart'));
  volChart.setOption({
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        var idx = params[0].dataIndex;
        return '<div style="font-size:13px;font-weight:600">' + dates[idx] + '</div>' +
          '<div style="font-size:12px;margin-top:4px">' +
          '成交量：<span style="font-weight:600">' + formatVol(rawData[idx].vol) + '</span><br/>' +
          '成交额：<span style="font-weight:600">' + formatAmount(rawData[idx].amount) + '</span></div>';
      }
    },
    grid: [{ left: '8%', right: '3%', top: '8%', height: '70%' }],
    xAxis: {
      type: 'category', data: dates,
      axisLabel: { formatter: function(v) { return v.slice(5); }, interval: Math.floor(dates.length / 12), color: '#999' },
      axisLine: { lineStyle: { color: '#e0e0e0' } },
      axisTick: { show: false }
    },
    yAxis: {
      scale: true,
      axisLabel: { formatter: function(v) { return (v / 10000).toFixed(0) + '万'; }, color: '#666' },
      splitLine: { lineStyle: { color: '#f0f0f0' } }
    },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, start: 60, end: 100 },
      { type: 'slider', xAxisIndex: 0, start: 60, end: 100, height: 26, bottom: 6,
        borderColor: 'transparent', backgroundColor: '#f5f5f5',
        fillerColor: 'rgba(15,52,96,0.2)', handleStyle: { color: '#0f3460' },
        textStyle: { color: '#999', fontSize: 10 } }
    ],
    series: [{
      name: '成交量', type: 'bar',
      data: rawData.map(function(d, i) {
        return { value: d.vol, itemStyle: { color: volColors[i], opacity: 0.85 } };
      }),
      barWidth: '60%'
    }]
  });

  // 联动缩放
  echarts.connect('cambricon');
  klineChart.group = 'cambricon';
  volChart.group = 'cambricon';

  // 鼠标悬停时动态更新概览卡片
  function onAxisPointer(params) {
    var info = params.axesInfo && params.axesInfo[0];
    if (info != null) {
      updateCards(info.value);
    }
  }
  klineChart.on('updateAxisPointer', onAxisPointer);
  volChart.on('updateAxisPointer', onAxisPointer);

  // 鼠标移出图表时恢复最后一天数据
  klineChart.getZr().on('globalout', resetCards);
  volChart.getZr().on('globalout', resetCards);

  // 点击K线也更新卡片（保留选中状态）
  klineChart.on('click', function(params) {
    if (params != null && params.dataIndex != null) {
      updateCards(params.dataIndex);
    }
  });
  volChart.on('click', function(params) {
    if (params != null && params.dataIndex != null) {
      updateCards(params.dataIndex);
    }
  });

  // 响应式
  window.addEventListener('resize', function() {
    klineChart.resize();
    volChart.resize();
  });
})();
</script>

</body>
</html>
